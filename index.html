<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Acre - Riverside Retreat</title>

<style>
body { 
    font-family: Arial, sans-serif; 
    margin: 0; 
    color: #333; 
    background: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1950&q=80') 
    no-repeat center center fixed; 
    background-size: cover;
}

.overlay {
    background: rgba(255,255,255,0.85);
    min-height: 100vh;
}

/* LANG */
.lang-switcher { 
    position: fixed; 
    top: 20px; 
    right: 20px; 
    background: white; 
    padding: 10px; 
    border-radius: 20px; 
    display: flex; 
    gap: 8px; 
}
.lang-btn { background: none; border: none; cursor: pointer; font-size: 20px; }
.lang-btn.active { border-bottom: 2px solid black; }

/* HERO */
.hero {
    position: relative;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1950&q=80') 
    no-repeat center center / cover;
    padding: 140px 20px;
    text-align: center;
    color: white;
}

.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
}

.hero h1, .hero p {
    position: relative;
    z-index: 1;
}

/* GRID */
.grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
}

/* CARD */
.card {
    background: white;
    padding: 30px;
    border-radius: 14px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.card h3 { margin-bottom: 10px; }

.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background: black;
    color: white;
    text-decoration: none;
    border-radius: 6px;
}

footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<div class="overlay">

<div class="lang-switcher">
    <button class="lang-btn active" onclick="changeLang('pl')">🇵🇱</button>
    <button class="lang-btn" onclick="changeLang('en')">🇬🇧</button>
    <button class="lang-btn" onclick="changeLang('ua')">🇺🇦</button>
    <button class="lang-btn" onclick="changeLang('ru')">🇷🇺</button>
</div>

<header class="hero">
    <h1>Green Acre</h1>
    <p id="hero-desc">Riverside retreat, natura i doświadczenia</p>
</header>

<div class="grid-container">

<div class="card">
    <h3 data-key="stay_title">🏡 Stay</h3>
    <p data-key="stay_text">Relax in nature by the river.</p>
    <a href="#" class="btn" data-key="stay_btn">Book</a>
</div>

<div class="card">
    <h3 data-key="archery_title">🏹 Archery</h3>
    <p data-key="archery_text">Try traditional archery.</p>
    <a href="#" class="btn" data-key="archery_btn">Join</a>
</div>

<div class="card">
    <h3 data-key="apple_title">🍎 Apples & Veg</h3>
    <p data-key="apple_text">Fresh farm produce.</p>
    <a href="#" class="btn" data-key="apple_btn">Ask</a>
</div>

<div class="card">
    <h3 data-key="harvest_title">🧺 Harvest Help</h3>
    <p data-key="harvest_text">Work and receive produce.</p>
    <a href="#" class="btn" data-key="harvest_btn">Help</a>
</div>

<div class="card">
    <h3 data-key="wood_title">🪓 Wood for Work</h3>
    <p data-key="wood_text">Barter system.</p>
    <a href="#" class="btn" data-key="wood_btn">Details</a>
</div>

</div>

<footer>
    © 2026 Green Acre
</footer>

</div>

<script>
const translations = {
    pl: {
        hero: "Riverside retreat, natura i doświadczenia",
        stay_title: "🏡 Pobyt",
        stay_text: "Odpocznij nad rzeką",
        stay_btn: "Rezerwuj",
        archery_title: "🏹 Łucznictwo",
        archery_text: "Spróbuj łucznictwa",
        archery_btn: "Dołącz",
        apple_title: "🍎 Owoce i warzywa",
        apple_text: "Świeże z farmy",
        apple_btn: "Zapytaj",
        harvest_title: "🧺 Pomoc za plony",
        harvest_text: "Pomoc = jedzenie",
        harvest_btn: "Pomagam",
        wood_title: "🪓 Drewno",
        wood_text: "Barter",
        wood_btn: "Szczegóły"
    },
    en: {
        hero: "Riverside retreat & nature experience",
        stay_title: "🏡 Stay",
        stay_text: "Relax by the river",
        stay_btn: "Book",
        archery_title: "🏹 Archery",
        archery_text: "Try archery",
        archery_btn: "Join",
        apple_title: "🍎 Produce",
        apple_text: "Fresh farm food",
        apple_btn: "Ask",
        harvest_title: "🧺 Harvest Help",
        harvest_text: "Work for produce",
        harvest_btn: "Help",
        wood_title: "🪓 Wood",
        wood_text: "Barter system",
        wood_btn: "Details"
    },
    ua: {
        hero: "Відпочинок біля річки",
        stay_title: "🏡 Відпочинок",
        stay_text: "Релакс на природі",
        stay_btn: "Забронювати",
        archery_title: "🏹 Лук",
        archery_text: "Спробуйте лук",
        archery_btn: "Приєднатись",
        apple_title: "🍎 Продукти",
        apple_text: "Свіжі з ферми",
        apple_btn: "Запитати",
        harvest_title: "🧺 Допомога",
        harvest_text: "Допомога за їжу",
        harvest_btn: "Допомогти",
        wood_title: "🪓 Дрова",
        wood_text: "Бартер",
        wood_btn: "Деталі"
    },
    ru: {
        hero: "Отдых у реки",
        stay_title: "🏡 Отдых",
        stay_text: "Расслабьтесь",
        stay_btn: "Бронировать",
        archery_title: "🏹 Стрельба",
        archery_text: "Попробуйте",
        archery_btn: "Присоединиться",
        apple_title: "🍎 Продукты",
        apple_text: "Свежие продукты",
        apple_btn: "Узнать",
        harvest_title: "🧺 Помощь",
        harvest_text: "Работа за еду",
        harvest_btn: "Помочь",
        wood_title: "🪓 Дрова",
        wood_text: "Бартер",
        wood_btn: "Подробнее"
    }
};

function changeLang(lang){
    document.getElementById('hero-desc').innerText = translations[lang].hero;

    document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if(translations[lang][key]) el.innerText = translations[lang][key];
    });

    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
}
</script>

</body>
</html>
